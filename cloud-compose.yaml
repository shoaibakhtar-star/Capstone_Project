services:
  fastapi:
    image: 639914974908.dkr.ecr.ap-south-1.amazonaws.com/fastapi-repo:latest
    container_name: fastapi
    env_file: .env
    networks:
      - backend
    ports:
      - "8000:8000"

  django:
    image: 639914974908.dkr.ecr.ap-south-1.amazonaws.com/django-repo:latest
    container_name: django
    env_file: .env
    networks:
      - backend
    ports:
      - "8001:8001"

  node-app:
    image: 639914974908.dkr.ecr.ap-south-1.amazonaws.com/node-repo:latest
    container_name: node-app
    env_file: .env
    networks:
      - backend
    ports:
      - "8002:8002"

  dotnet:
    image: 639914974908.dkr.ecr.ap-south-1.amazonaws.com/dotnet-repo:latest
    container_name: dotnet
    env_file: .env
    networks:
      - backend
    ports:
      - "8003:8003"

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    depends_on:
      - fastapi
      - django
      - node-app
      - dotnet

networks:
  backend:
    driver: bridge