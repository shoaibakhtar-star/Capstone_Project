services:

  mysql:
    image: mysql:8
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u admin -p$DB_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10
    container_name: mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql

  fastapi:
    build: ./backend/python-fastapi
    container_name: fastapi
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    # ports:
    #   - "${FASTAPI_PORT}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  django:
    build: ./backend/python-django
    container_name: django
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    # ports:
    #   - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  node-app:
    build: ./backend/backend-node
    container_name: node-app
    restart: unless-stopped
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    # ports:
    #   - "8002:8002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8002/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  dotnet:
    build: ./backend/backend-dotnet
    container_name: dotnet
    restart: always
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
    # ports:
    #   - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
  # frontend:
  #   build: ./frontend
  #   container_name: frontend
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - fastapi
  #     - django
  #     - node-app

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      fastapi:
        condition: service_healthy
      node-app:
        condition: service_healthy
      django:
        condition: service_healthy
      dotnet:
        condition: service_healthy


volumes:
  mysql_data:
