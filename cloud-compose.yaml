services:
  fastapi:
    image: 688939571878.dkr.ecr.ap-south-1.amazonaws.com/fastapi-repo:${IMAGE_TAG}
    container_name: fastapi
    env_file: cloud.env
    networks:
      - backend
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  django:
    image: 688939571878.dkr.ecr.ap-south-1.amazonaws.com/django-repo:${IMAGE_TAG}
    container_name: django
    env_file: cloud.env
    networks:
      - backend
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  node-app:
    image: 688939571878.dkr.ecr.ap-south-1.amazonaws.com/node-repo:${IMAGE_TAG}
    container_name: node-app
    env_file: cloud.env
    networks:
      - backend
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8002/health', r => process.exit(r.statusCode===200?0:1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  dotnet:
    image: 688939571878.dkr.ecr.ap-south-1.amazonaws.com/dotnet-repo:${IMAGE_TAG}
    container_name: dotnet
    env_file: cloud.env
    networks:
      - backend
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend
    depends_on:
      fastapi:
        condition: service_healthy
      django:
        condition: service_healthy
      node-app:
        condition: service_healthy
      dotnet:
        condition: service_healthy

networks:
  backend:
    driver: bridge
